spring:
  application:
    name: physioflow-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/physioflow
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    enabled: false

server:
  port: 8080
